{% load i18n %}
<dl class="row mb-0">
    <dt class="col-sm-3">{% translate "Name:" %}</dt>
    <dd class="col-sm-9"><strong>{{ object.name }}</strong></dd>

    <dt class="col-sm-3">{% translate "Status:" %}</dt>
    <dd class="col-sm-9">{{ object.get_status_display|default:_("Active") }}</dd>

    <dt class="col-sm-3">{% translate "Description:" %}</dt>
    <dd class="col-sm-9 text-secondary">{% if object.description %}{{ object.description|linebreaksbr }}{% else %}<i>{% translate "No description provided." %}</i>{% endif %}</dd>
</dl>
