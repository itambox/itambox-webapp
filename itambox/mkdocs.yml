# mkdocs.yml (ITAMbox Root)
site_name: ITAMbox End-User Documentation
site_url: https://docs.itambox.local/
site_dir: static/docs  # Outputs compiled files directly into Django's static folder
use_directory_urls: false


theme:
  name: material  # Mirror of NetBox's gorgeous Material for MkDocs theme
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

