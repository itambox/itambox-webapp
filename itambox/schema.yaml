components:
  schemas:
    AcceptanceStatusEnum:
      enum:
      - pending
      - accepted
      - declined
      type: string
      description: |-
        * `pending` - Pending
        * `accepted` - Accepted
        * `declined` - Declined
    Accessory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        manufacturer:
          allOf:
          - $ref: '#/components/schemas/NestedManufacturer'
          readOnly: true
        category:
          type: string
          readOnly: true
        part_number:
          type: string
          description: SKU or manufacturer part number
          maxLength: 100
        total_stock:
          type: integer
          readOnly: true
        checked_out_qty:
          type: integer
          readOnly: true
        available:
          type: integer
          readOnly: true
        min_qty:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: Safety Threshold
          description: Alert threshold quantity
        allow_overallocate:
          type: boolean
          title: Allow Over-allocation
          description: Allow checkout count to exceed stock capacity
        notes:
          type: string
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          readOnly: true
        tenant:
          allOf:
          - $ref: '#/components/schemas/NestedTenant'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - available
      - category
      - checked_out_qty
      - created_at
      - id
      - manufacturer
      - name
      - slug
      - tags
      - tenant
      - total_stock
      - updated_at
    AccessoryAssignment:
