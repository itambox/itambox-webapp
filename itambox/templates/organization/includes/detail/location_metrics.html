{% load i18n %}
<div class="row g-3 mb-4">
    <div class="col-sm-6">
        <div class="card card-sm bg-green-lt border-0 shadow-none">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <span class="bg-green text-white avatar rounded shadow-sm">
                            <i class="mdi mdi-laptop"></i>
                        </span>
                    </div>
                    <div class="col">
                        <div class="font-weight-medium text-green small uppercase font-sans">{% translate "Physical Assets" %}</div>
                        <div class="text-green h1 mb-0 font-weight-bold">{{ assets_table.rows|length }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-sm-6">
        <div class="card card-sm bg-azure-lt border-0 shadow-none">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <span class="bg-azure text-white avatar rounded shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 10m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0" /><path d="M3 21v-2a4 4 0 0 1 4 -4h10a4 4 0 0 1 4 4v2" /></svg>
                        </span>
                    </div>
                    <div class="col">
                        <div class="font-weight-medium text-azure small uppercase font-sans">{% translate "Child Locations" %}</div>
                        <div class="text-azure h1 mb-0 font-weight-bold">{{ object.children.count }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="row g-3">
    <div class="col-sm-6">
        <div class="card card-sm bg-teal-lt border-0 shadow-none">
            <div class="card-body p-2">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <span class="bg-teal text-white avatar-sm rounded shadow-sm">
                            <i class="mdi mdi-keyboard-outline"></i>
                        </span>
                    </div>
                    <div class="col">
                        <div class="font-weight-medium text-teal small uppercase font-sans">{% translate "Accessory Checkouts" %}</div>
                        <div class="text-teal h3 mb-0 font-weight-bold">{{ object.accessory_assignments.count }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-sm-6">
        <div class="card card-sm bg-cyan-lt border-0 shadow-none">
            <div class="card-body p-2">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <span class="bg-cyan text-white avatar-sm rounded shadow-sm">
                            <i class="mdi mdi-water-outline"></i>
                        </span>
                    </div>
                    <div class="col">
                        <div class="font-weight-medium text-cyan small uppercase font-sans">{% translate "Consumable Usage" %}</div>
                        <div class="text-cyan h3 mb-0 font-weight-bold">{{ object.consumable_consumptions.count }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
