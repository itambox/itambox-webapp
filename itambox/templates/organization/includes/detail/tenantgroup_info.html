{% load i18n %}
<dl class="row mb-0">
    <dt class="col-sm-3">{% translate "Name:" %}</dt>
    <dd class="col-sm-9">{{ object.name }}</dd>

    <dt class="col-sm-3">{% translate "Slug:" %}</dt>
    <dd class="col-sm-9">{{ object.slug }}</dd>

    <dt class="col-sm-3">{% translate "Parent:" %}</dt>
    <dd class="col-sm-9">
        {% if object.parent %}
            <a href="{% url 'organization:tenantgroup_detail' pk=object.parent.pk %}">{{ object.parent.name }}</a>
        {% else %}
            <i>{% translate "None" %}</i>
        {% endif %}
    </dd>
</dl>
