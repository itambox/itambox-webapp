{% load i18n %}
<dl class="row mb-0">
    <dt class="col-sm-4">{% translate "Prefix:" %}</dt>
    <dd class="col-sm-8"><span class="badge bg-secondary-lt font-monospace">{{ object.prefix }}</span></dd>

    <dt class="col-sm-4">{% translate "Next Numeric Value:" %}</dt>
    <dd class="col-sm-8"><span class="badge bg-primary-lt">{{ object.next_value }}</span></dd>

    <dt class="col-sm-4">{% translate "Zero Padding:" %}</dt>
    <dd class="col-sm-8">{{ object.zero_padding }} {% translate "digits" %}</dd>

    <dt class="col-sm-4">{% translate "Next Tag Preview:" %}</dt>
    <dd class="col-sm-8"><strong class="font-monospace text-primary">{{ object.next_tag_preview }}</strong></dd>
</dl>
