# ==============================================================================
# ITAMbox Automated Dependabot Configuration
# ==============================================================================
# Automates weekly dependency scans for Python, npm, and GitHub Actions.
# ==============================================================================

version: 2
updates:
  # Check the root pyproject.toml and uv.lock dependency graph.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/itambox"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/itambox/tests/e2e"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5

  # Check for GitHub Actions runner updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3
