name: E2E (Playwright)

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: [self-hosted, Linux, ARM64, itambox-ci]
    timeout-minutes: 60

    env:
      ITAMBOX_ENV: dev
      ITAMBOX_DB_NAME: itambox_e2e
      ITAMBOX_DB_USER: itambox_e2e
      ITAMBOX_DB_PASSWORD: itambox_e2e
      ITAMBOX_DB_HOST: localhost
      ITAMBOX_DB_PORT: "5432"
      ITAMBOX_DB_SSLMODE: disable
      DJANGO_SUPERUSER_USERNAME: e2e-admin
      DJANGO_SUPERUSER_EMAIL: e2e@itambox.local
      E2E_USERNAME: e2e-admin
      E2E_BASE_URL: http://localhost:8000
      # Playwright's webServer config uses a venv path; in CI we manage the server
      # ourselves for reliability and to avoid venv path assumptions.
      E2E_NO_WEBSERVER: "1"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Start PostgreSQL in the runner network namespace
        id: postgres
        shell: bash
        run: |
          security_options=$(docker info --format '{{json .SecurityOptions}}')
          [[ ${security_options} == *name=rootless* ]]

          runner_id=$(docker inspect --format '{{.Id}}' "${HOSTNAME}")
          [[ ${runner_id} =~ ^[0-9a-f]{64}$ ]]
          runner_identity=$(docker inspect \
            --format '{{.Name}}|{{index .Config.Labels "io.itambox.role"}}|{{.State.Running}}' \
            "${runner_id}")
          [[ ${runner_identity} == '/itambox-ci-runner|ci-runner|true' ]]

          container_id_output=$(docker container ls --all --quiet --no-trunc)
          grep -Fxq "${runner_id}" <<<"${container_id_output}"
          mapfile -t unexpected_ids < <(grep -Fvx "${runner_id}" <<<"${container_id_output}" || true)
          ((${#unexpected_ids[@]} == 0))
          if PGCONNECT_TIMEOUT=1 PGPASSWORD=itambox_e2e psql \
            --host 127.0.0.1 --port 5432 --username itambox_e2e --dbname itambox_e2e \
            --no-password --command 'SELECT 1;' >/dev/null 2>&1; then
            echo "a PostgreSQL service already occupies the runner namespace" >&2
            exit 1
          fi

          postgres_name="postgres-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          postgres_id=
          cleanup_failed_start() {
            rc=$?
            if ((rc != 0)) && [[ ${postgres_id} =~ ^[0-9a-f]{64}$ ]]; then
              docker rm --force "${postgres_id}" >/dev/null 2>&1 || true
            fi
            exit "${rc}"
          }
          trap cleanup_failed_start EXIT

          postgres_id=$(docker run --detach \
            --name "${postgres_name}" \
            --network "container:${runner_id}" \
            --read-only \
            --tmpfs /tmp:rw,nosuid,nodev,noexec,size=64m \
            --tmpfs /var/lib/postgresql/data:rw,nosuid,nodev,noexec,size=1g \
            --tmpfs /var/run/postgresql:rw,nosuid,nodev,noexec,size=16m \
            --security-opt no-new-privileges \
            --env POSTGRES_DB=itambox_e2e \
            --env POSTGRES_USER=itambox_e2e \
            --env POSTGRES_PASSWORD=itambox_e2e \
            --label io.itambox.role=postgres-sidecar \
            --label "io.itambox.github-run-id=${GITHUB_RUN_ID}" \
            --health-cmd='pg_isready --host 127.0.0.1 --port 5432 --username itambox_e2e --dbname itambox_e2e' \
            --health-interval=2s \
            --health-timeout=2s \
            --health-retries=30 \
            postgres:16@sha256:33f923b05f64ca54ac4401c01126a6b92afe839a0aa0a52bc5aeb5cc958e5f20 \
            postgres -c listen_addresses=127.0.0.1)
          [[ ${postgres_id} =~ ^[0-9a-f]{64}$ ]]

          postgres_healthy=false
          for _ in $(seq 1 60); do
            container_state=$(docker inspect \
              --format '{{.State.Status}}|{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' \
              "${postgres_id}")
            case ${container_state} in
              running\|healthy)
                postgres_healthy=true
                break
                ;;
              exited\|*|dead\|*|*\|unhealthy|*\|missing)
                docker logs "${postgres_id}"
                exit 1
                ;;
            esac
            sleep 2
          done
          [[ ${postgres_healthy} == true ]]

          # Retry an authenticated TCP query from the Actions runner itself.
          # This cannot succeed against PostgreSQL's temporary Unix-socket-only
          # initialization server and proves localhost namespace sharing.
          postgres_ready=false
          for _ in $(seq 1 60); do
            if PGCONNECT_TIMEOUT=2 PGPASSWORD=itambox_e2e psql \
              --host 127.0.0.1 \
              --port 5432 \
              --username itambox_e2e \
              --dbname itambox_e2e \
              --no-password \
              --command 'SELECT 1;' >/dev/null 2>&1; then
              postgres_ready=true
              break
            fi
            sleep 2
          done
          if [[ ${postgres_ready} != true ]]; then
            docker logs "${postgres_id}"
            exit 1
          fi
          [[ $(docker inspect --format '{{.State.Running}}|{{.State.Health.Status}}' "${postgres_id}") == 'true|healthy' ]]
          echo "container_id=${postgres_id}" >>"${GITHUB_OUTPUT}"
          trap - EXIT

      - name: Set up Python 3.12
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: itambox/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./itambox
        run: npm ci

      - name: Build frontend assets
        working-directory: ./itambox
        run: npm run build:all

      - name: Install E2E dependencies
        working-directory: ./itambox/tests/e2e
        run: npm ci

      - name: Configure ephemeral Playwright browser path
        run: echo "PLAYWRIGHT_BROWSERS_PATH=${RUNNER_TEMP}/ms-playwright" >> "$GITHUB_ENV"

      - name: Install Playwright browsers
        working-directory: ./itambox/tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Create venv shim for preflight-check
        run: |
          # preflight-check.mjs expects a .venv directory; create a shim that
          # points to the system Python so prerequisite checks pass in CI.
          mkdir -p .venv/bin
          ln -sf "$(which python)" .venv/bin/python

      - name: Run Django system checks
        working-directory: ./itambox
        run: python manage.py check

      - name: Run migrations
        working-directory: ./itambox
        run: python manage.py migrate

      - name: Generate ephemeral E2E credentials
        shell: bash
        run: |
          E2E_PASSWORD="$(python -c 'import secrets; print(secrets.token_urlsafe(32))')"
          echo "::add-mask::$E2E_PASSWORD"
          echo "E2E_PASSWORD=$E2E_PASSWORD" >> "$GITHUB_ENV"
          echo "DJANGO_SUPERUSER_PASSWORD=$E2E_PASSWORD" >> "$GITHUB_ENV"

      - name: Seed test data (minimal)
        working-directory: ./itambox
        run: python manage.py seed_data --production

      - name: Start Django dev server
        working-directory: ./itambox
        run: |
          echo "Starting Django dev server on loopback port 8000..."
          python manage.py runserver 127.0.0.1:8000 &
          DJANGO_PID=$!
          echo "DJANGO_PID=$DJANGO_PID" >> "$GITHUB_ENV"
          django_ready=false
          for _ in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ | grep -q "200\|301\|302"; then
              django_ready=true
              break
            fi
            sleep 1
          done
          [[ ${django_ready} == true ]]
          echo "Django server ready."

      - name: Run E2E tests
        id: e2e
        working-directory: ./itambox/tests/e2e
        run: npm test
        timeout-minutes: 15

      - name: Stop Django dev server
        if: always()
        working-directory: ./itambox
        run: |
          if [ -n "$DJANGO_PID" ]; then
            kill "$DJANGO_PID" 2>/dev/null || true
          fi
          # Fallback: kill any remaining runserver processes
          pkill -f "manage.py runserver" 2>/dev/null || true

      - name: Upload Playwright traces on failure
        if: failure() && steps.e2e.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-traces
          path: |
            itambox/tests/e2e/test-results/
            itambox/tests/e2e/playwright-report/
            itambox/tests/e2e/storageStateError.png
          if-no-files-found: warn
          retention-days: 7

      - name: Remove PostgreSQL
        if: always()
        env:
          POSTGRES_ID: ${{ steps.postgres.outputs.container_id }}
        run: |
          postgres_id=${POSTGRES_ID:-}
          postgres_name="postgres-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          expected_identity="/${postgres_name}|${GITHUB_RUN_ID}"
          if [[ -z ${postgres_id} ]]; then
            candidate_output=$(docker container ls --all --quiet --no-trunc \
              --filter "label=io.itambox.github-run-id=${GITHUB_RUN_ID}" \
              --filter "name=^/${postgres_name}$")
            candidate_ids=()
            while IFS= read -r candidate_id; do
              [[ -z ${candidate_id} ]] || candidate_ids+=("${candidate_id}")
            done <<<"${candidate_output}"
            ((${#candidate_ids[@]} <= 1))
            ((${#candidate_ids[@]} == 0)) && exit 0
            postgres_id=${candidate_ids[0]}
          fi
          [[ ${postgres_id} =~ ^[0-9a-f]{64}$ ]]
          actual_identity=$(docker inspect \
            --format '{{.Name}}|{{index .Config.Labels "io.itambox.github-run-id"}}' \
            "${postgres_id}")
          [[ ${actual_identity} == "${expected_identity}" ]]
          docker rm --force "${postgres_id}" >/dev/null
