name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: itambox_ci
          POSTGRES_USER: itambox_ci
          POSTGRES_PASSWORD: itambox_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itambox_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ITAMBOX_ENV: dev
      ITAMBOX_DB_NAME: itambox_ci
      ITAMBOX_DB_USER: itambox_ci
      ITAMBOX_DB_PASSWORD: itambox_ci
      ITAMBOX_DB_HOST: localhost
      ITAMBOX_DB_PORT: "5432"
      ITAMBOX_DB_SSLMODE: disable

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r itambox/requirements.txt
          pip install pytest pytest-django pytest-cov pytest-xdist model_bakery factory_boy tblib

      - name: Check for missing migrations
        working-directory: ./itambox
        run: |
          python manage.py makemigrations --check --dry-run

      - name: Run Django system checks
        working-directory: ./itambox
        run: |
          python manage.py check

      - name: Run tests
        working-directory: ./itambox
        run: |
          pytest --cov=. --cov-report=term --cov-fail-under=45

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 itambox/ --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=migrations,.venv,__pycache__
          flake8 itambox/ --count --exit-zero --max-complexity=10 --statistics --exclude=migrations,.venv,__pycache__
