name: CI

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: itambox_ci
          POSTGRES_USER: itambox_ci
          POSTGRES_PASSWORD: itambox_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd=pg_isready
          --health-interval=2s
          --health-timeout=2s
          --health-retries=30

    env:
      ITAMBOX_ENV: dev
      ITAMBOX_DB_NAME: itambox_ci
      ITAMBOX_DB_USER: itambox_ci
      ITAMBOX_DB_PASSWORD: itambox_ci
      ITAMBOX_DB_HOST: localhost
      ITAMBOX_DB_PORT: "5432"
      ITAMBOX_DB_SSLMODE: disable

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"
          enable-cache: true
          cache-dependency-glob: uv.lock

      # python-ldap (pulled by django-auth-ldap) needs libldap2/sasl headers for
      # source builds. ubuntu-latest images can miss these under transient updates.
      - name: Install system deps for python-ldap
        run: |
          if command -v apt-get >/dev/null; then
            if [ "$(id -u)" -eq 0 ]; then
              apt-get update
              apt-get install -y --no-install-recommends \
                gcc \
                libmagic1 \
                libldap2-dev \
                libsasl2-dev \
                libssl-dev \
                xmlsec1
            else
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                gcc \
                libmagic1 \
                libldap2-dev \
                libsasl2-dev \
                libssl-dev \
                xmlsec1
            fi
          fi

      - name: Install dependencies
        run: |
          uv lock --check
          uv sync --locked --group dev

      - name: Verify native runtime bindings
        run: |
          uv run --locked --no-sync python -c "import ldap, magic; print(ldap.__version__); print(magic.from_buffer(b'ITAMbox'))"
          xmlsec1 --version

      - name: Check for missing migrations
        working-directory: ./itambox
        run: |
          uv run --locked --no-sync python manage.py makemigrations --check --dry-run

      - name: Run Django system checks
        working-directory: ./itambox
        run: |
          uv run --locked --no-sync python manage.py check

      - name: Run tests
        working-directory: ./itambox
        run: |
          uv run --locked --no-sync pytest --cov=. --cov-report=term --cov-fail-under=45

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install lint dependencies
        run: |
          uv lock --check
          uv sync --locked --only-group dev

      - name: Lint with flake8 (blocking baseline gate)
        run: |
          uv run --locked --no-sync python scripts/check_flake8_baseline.py

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install documentation dependencies
        run: |
          uv lock --check
          uv sync --locked --only-group docs

      - name: Build docs (strict — fails on broken nav entries or unresolved links)
        working-directory: ./itambox
        run: uv run --locked --no-sync mkdocs build --strict

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js 20
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: itambox/package-lock.json

      - name: Install dependencies
        working-directory: ./itambox
        run: npm ci

      - name: Build frontend assets
        working-directory: ./itambox
        run: npm run build:all

      - name: Type-check (tsc)
        working-directory: ./itambox
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        working-directory: ./itambox
        run: npx eslint static/src
