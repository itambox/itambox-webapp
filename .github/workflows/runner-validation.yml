name: Runner validation

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runner-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  isolation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify runner isolation boundary
        run: |
          set -Eeuo pipefail
          test ! -e /srv/itambox
          test ! -e /etc/itambox
          # The rootless gateway must expose no HTTP service. The production
          # bridge must remain unreachable; the root-owned live verifier proves
          # that denial separately with the host nftables counter. GitHub-hosted
          # Azure runners legitimately expose IMDS at 169.254.169.254, so its
          # presence is not evidence of access to ITAMbox infrastructure.
          for target in http://127.0.0.1:9120 http://127.0.0.1:9130 http://172.18.0.1 http://172.19.0.1 http://152.53.19.147:22; do
            if curl --silent --show-error --max-time 2 "${target}" >/dev/null 2>&1; then
              echo "unexpected access to ${target}" >&2
              exit 1
            fi
          done
          curl --fail --silent --show-error --max-time 15 https://api.github.com/zen >/dev/null
          echo "runner isolation boundary: PASS"

  lint:
    needs: isolation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install lint dependencies
        run: |
          uv lock --check
          uv sync --locked --only-group dev

      - name: Lint with flake8
        run: uv run --locked --no-sync python scripts/check_flake8_baseline.py

  docs:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install documentation dependencies
        run: |
          uv lock --check
          uv sync --locked --only-group docs

      - name: Build docs
        working-directory: ./itambox
        run: uv run --locked --no-sync mkdocs build --strict

  frontend:
    needs: docs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Node.js 20
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: itambox/package-lock.json

      - name: Install dependencies
        working-directory: ./itambox
        run: npm ci

      - name: Build and check frontend
        working-directory: ./itambox
        run: |
          npm run build:all
          npx tsc --noEmit
          npx eslint static/src
