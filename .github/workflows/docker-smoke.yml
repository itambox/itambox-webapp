name: Docker Compose Smoke Test

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helpers:
    runs-on: [self-hosted, Linux, ARM64, itambox-ci]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate shell syntax
        run: |
          bash -n scripts/docker-smoke-test.sh
          bash -n scripts/tests/test_docker_smoke_helpers.sh

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Validate workflow/compose YAML syntax
        run: |
          python - <<'PYEOF'
          import yaml
          for path in (".github/workflows/docker-smoke.yml", "docker-compose.yml"):
              with open(path, encoding="utf-8") as f:
                  yaml.safe_load(f)
              print(f"{path}: valid YAML")
          PYEOF

      - name: Run secret-generation helper unit tests
        run: scripts/tests/test_docker_smoke_helpers.sh

  smoke:
    needs: helpers
    runs-on: [self-hosted, Linux, ARM64, itambox-ci]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Docker / Compose versions
        run: |
          security_options="$(docker info --format '{{json .SecurityOptions}}')"
          [[ "$security_options" == *name=rootless* ]]
          docker version
          docker compose version

      - name: Run production Docker Compose smoke test
        id: smoke
        run: ./scripts/docker-smoke-test.sh

      - name: Upload smoke test diagnostics
        if: failure() && steps.smoke.outputs.log-dir != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-smoke-logs
          path: ${{ steps.smoke.outputs.log-dir }}
          if-no-files-found: warn
          retention-days: 7
