name: Docker Compose Smoke Test

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helpers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate shell syntax
        run: |
          bash -n scripts/docker-smoke-test.sh
          bash -n scripts/tests/test_docker_smoke_helpers.sh

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install helper dependencies
        run: |
          uv lock --check
          uv sync --locked --only-group dev

      - name: Validate workflow/compose YAML syntax
        run: |
          uv run --locked --no-sync python - <<'PYEOF'
          import yaml
          for path in (".github/workflows/docker-smoke.yml", "docker-compose.yml"):
              with open(path, encoding="utf-8") as f:
                  yaml.safe_load(f)
              print(f"{path}: valid YAML")
          PYEOF

      - name: Run secret-generation helper unit tests
        run: scripts/tests/test_docker_smoke_helpers.sh

  smoke:
    needs: helpers
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Docker / Compose versions
        run: |
          docker version
          docker compose version

      - name: Run production Docker Compose smoke test
        id: smoke
        run: ./scripts/docker-smoke-test.sh

      - name: Upload smoke test diagnostics
        if: failure() && steps.smoke.outputs.log-dir != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-smoke-logs
          path: ${{ steps.smoke.outputs.log-dir }}
          if-no-files-found: warn
          retention-days: 7
