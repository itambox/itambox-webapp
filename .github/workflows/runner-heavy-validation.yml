name: Runner heavy validation

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runner-heavy-validation
  cancel-in-progress: false

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: itambox_ci
          POSTGRES_USER: itambox_ci
          POSTGRES_PASSWORD: itambox_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd=pg_isready
          --health-interval=2s
          --health-timeout=2s
          --health-retries=30

    env:
      ITAMBOX_ENV: dev
      ITAMBOX_DB_NAME: itambox_ci
      ITAMBOX_DB_USER: itambox_ci
      ITAMBOX_DB_PASSWORD: itambox_ci
      ITAMBOX_DB_HOST: localhost
      ITAMBOX_DB_PORT: "5432"
      ITAMBOX_DB_SSLMODE: disable

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      # python-ldap (pulled by django-auth-ldap) needs libldap2/sasl headers for
      # source builds. Some ubuntu images miss these packages by default.
      - name: Install system deps for python-ldap
        run: |
          if command -v apt-get >/dev/null; then
            if [ "$(id -u)" -eq 0 ]; then
              apt-get update
              apt-get install -y --no-install-recommends \
                gcc \
                libldap2-dev \
                libsasl2-dev \
                libssl-dev
            else
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                gcc \
                libldap2-dev \
                libsasl2-dev \
                libssl-dev
            fi
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check for missing migrations
        working-directory: ./itambox
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django system checks
        working-directory: ./itambox
        run: python manage.py check

      - name: Run tests
        working-directory: ./itambox
        run: pytest --cov=. --cov-report=term --cov-fail-under=45
