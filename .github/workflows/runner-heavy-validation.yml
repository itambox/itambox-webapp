name: Runner heavy validation

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runner-heavy-validation
  cancel-in-progress: false

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: itambox_ci
          POSTGRES_USER: itambox_ci
          POSTGRES_PASSWORD: itambox_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd=pg_isready
          --health-interval=2s
          --health-timeout=2s
          --health-retries=30

    env:
      ITAMBOX_ENV: dev
      ITAMBOX_DB_NAME: itambox_ci
      ITAMBOX_DB_USER: itambox_ci
      ITAMBOX_DB_PASSWORD: itambox_ci
      ITAMBOX_DB_HOST: localhost
      ITAMBOX_DB_PORT: "5432"
      ITAMBOX_DB_SSLMODE: disable

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python 3.12
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"
          enable-cache: true
          cache-dependency-glob: uv.lock

      # python-ldap (pulled by django-auth-ldap) needs libldap2/sasl headers for
      # source builds. Some ubuntu images miss these packages by default.
      - name: Install system deps for python-ldap
        run: |
          if command -v apt-get >/dev/null; then
            if [ "$(id -u)" -eq 0 ]; then
              apt-get update
              apt-get install -y --no-install-recommends \
                gcc \
                libmagic1 \
                libldap2-dev \
                libsasl2-dev \
                libssl-dev \
                xmlsec1
            else
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                gcc \
                libmagic1 \
                libldap2-dev \
                libsasl2-dev \
                libssl-dev \
                xmlsec1
            fi
          fi

      - name: Install dependencies
        run: |
          uv lock --check
          uv sync --locked --group dev

      - name: Check for missing migrations
        working-directory: ./itambox
        run: uv run --locked --no-sync python manage.py makemigrations --check --dry-run

      - name: Run Django system checks
        working-directory: ./itambox
        run: uv run --locked --no-sync python manage.py check

      - name: Run tests
        working-directory: ./itambox
        run: uv run --locked --no-sync pytest --cov=. --cov-report=term --cov-fail-under=45
