name: Self-hosted runner heavy validation

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runner-heavy-validation
  cancel-in-progress: false

jobs:
  backend:
    name: backend
    runs-on: [self-hosted, Linux, ARM64, itambox-ci]
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16@sha256:33f923b05f64ca54ac4401c01126a6b92afe839a0aa0a52bc5aeb5cc958e5f20
        env:
          POSTGRES_DB: itambox_ci
          POSTGRES_USER: itambox_ci
          POSTGRES_PASSWORD: itambox_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itambox_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ITAMBOX_ENV: dev
      ITAMBOX_DB_NAME: itambox_ci
      ITAMBOX_DB_USER: itambox_ci
      ITAMBOX_DB_PASSWORD: itambox_ci
      ITAMBOX_DB_HOST: localhost
      ITAMBOX_DB_PORT: "5432"
      ITAMBOX_DB_SSLMODE: disable

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check for missing migrations
        working-directory: ./itambox
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django system checks
        working-directory: ./itambox
        run: python manage.py check

      - name: Run tests
        working-directory: ./itambox
        run: pytest --cov=. --cov-report=term --cov-fail-under=45
