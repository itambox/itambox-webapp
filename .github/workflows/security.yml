name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  policy:
    name: policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Validate policy and contract tests
        run: |
          python scripts/security_gate.py validate
          python -m unittest scripts.tests.test_security_gate
          bash -n scripts/install_security_tools.sh

  dependencies:
    name: dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Verify canonical Python lock
        run: uv lock --check
      - name: Install checksum-verified Trivy
        run: |
          bash scripts/install_security_tools.sh "$RUNNER_TEMP/security-tools" trivy
          echo "$RUNNER_TEMP/security-tools" >> "$GITHUB_PATH"
      - name: Scan canonical dependency definitions
        shell: bash
        run: |
          set +x
          targets=(
            "uv.lock"
            "itambox/package-lock.json"
            "itambox/tests/e2e/package-lock.json"
          )
          for target in "${targets[@]}"; do
            test -f "$target" || { echo "Canonical dependency input is missing" >&2; exit 2; }
          done
          if ! trivy fs --quiet --scanners vuln --include-dev-deps \
            --format json --output "$RUNNER_TEMP/trivy-dependencies.json" . \
            >"$RUNNER_TEMP/trivy.stdout" 2>"$RUNNER_TEMP/trivy.stderr"; then
            echo "Dependency scanner failed; raw diagnostics are retained only on the runner" >&2
            exit 2
          fi
      - name: Apply thresholds and suppressions
        id: dependency-gate
        shell: bash
        run: |
          set +x
          set +e
          python scripts/security_gate.py trivy \
            --report "$RUNNER_TEMP/trivy-dependencies.json" \
            --expect-target "uv.lock" \
            --expect-target "itambox/package-lock.json" \
            --expect-target "itambox/tests/e2e/package-lock.json" \
            --sarif "$RUNNER_TEMP/trivy-dependencies.sarif"
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [[ -s "$RUNNER_TEMP/trivy-dependencies.sarif" ]]; then
            echo "sarif=true" >> "$GITHUB_OUTPUT"
          else
            echo "sarif=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Retain dependency results in Code Scanning
        if: >-
          always() && steps.dependency-gate.outputs.sarif == 'true' &&
          github.actor != 'dependabot[bot]' &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: ${{ runner.temp }}/trivy-dependencies.sarif
          category: trivy-dependencies
      - name: Enforce dependency gate
        if: always()
        env:
          GATE_STATUS: ${{ steps.dependency-gate.outputs.status }}
        run: |
          if [[ -z "$GATE_STATUS" || "$GATE_STATUS" != "0" ]]; then
            echo "Dependency security gate failed" >&2
            exit 1
          fi

  secrets:
    name: secrets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install checksum-verified Gitleaks
        run: |
          bash scripts/install_security_tools.sh "$RUNNER_TEMP/security-tools" gitleaks
          echo "$RUNNER_TEMP/security-tools" >> "$GITHUB_PATH"
      - name: Select reviewed commit range
        id: range
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            value="${PR_BASE}..${PR_HEAD}"
          elif [[ "$EVENT_NAME" == "push" && ! "$PUSH_BEFORE" =~ ^0+$ ]]; then
            value="${PUSH_BEFORE}..${PUSH_SHA}"
          else
            value="--all"
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"
      - name: Scan commits without exposing findings
        shell: bash
        env:
          LOG_OPTS: ${{ steps.range.outputs.value }}
        run: |
          set +x
          if ! gitleaks git . --log-opts="$LOG_OPTS" --redact=100 \
            --report-format=json --report-path="$RUNNER_TEMP/gitleaks.json" \
            --exit-code=0 --no-banner \
            >"$RUNNER_TEMP/gitleaks.stdout" 2>"$RUNNER_TEMP/gitleaks.stderr"; then
            echo "Secret scanner failed; raw diagnostics are retained only on the runner" >&2
            exit 2
          fi
          if [[ ! -s "$RUNNER_TEMP/gitleaks.json" ]]; then printf '[]\n' > "$RUNNER_TEMP/gitleaks.json"; fi
      - name: Apply secret policy
        run: |
          set +x
          python scripts/security_gate.py gitleaks --report "$RUNNER_TEMP/gitleaks.json" || {
            echo "Secret findings detected or secret policy invalid" >&2
            exit 1
          }
