[flake8]
max-line-length = 120
max-complexity = 10
# Generated/dependency/vendor paths only -- never hand-written app code.
exclude =
    .git,
    __pycache__,
    *migrations*,
    .venv,
    venv,
    node_modules,
    dist,
    itambox/static/dist,
    itambox/static/docs
select = B,C,E,F,W,B9
# Blocking policy: this is the gate CI and pre-commit enforce (see
# scripts/check_flake8_baseline.py for how pre-existing debt is grandfathered
# without exempting new violations). Each ignore below is deliberate, not a
# blanket relaxation:
#   E203 (whitespace before ':')   -- pycodestyle's slice-colon spacing rule
#       flags PEP 8-compliant slicing (e.g. `x[1 :2]` false positives on
#       normal `x[a : b]` usage); pyflakes/pycodestyle acknowledge this is
#       overly strict and it is conventionally disabled.
#   E501 (line too long)           -- superseded by B950 (flake8-bugbear,
#       enabled via the B9 code in `select` above), which flags the same
#       thing but with a 10% grace margin instead of a hard cutoff, avoiding
#       flagging lines a single character over the limit.
#   W503 (line break before binary operator) -- PEP 8 itself now prefers
#       breaking *before* the operator; W503 and its complement W504 (break
#       *after*, left enabled) are mutually exclusive style opinions, and
#       this repo's policy is "break before".
ignore = E203, E501, W503
format = default
