version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ITAMBOX_SECRET_KEY=change-me-in-production
      - ITAMBOX_DEBUG=True
      - ITAMBOX_DB_ENGINE=django.db.backends.postgresql
      - ITAMBOX_DB_NAME=itambox
      - ITAMBOX_DB_USER=itambox
      - ITAMBOX_DB_PASSWORD=itambox
      - ITAMBOX_DB_HOST=db
      - ITAMBOX_DB_PORT=5432
    volumes:
      - ./itambox:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: itambox
      POSTGRES_PASSWORD: itambox
      POSTGRES_DB: itambox
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itambox -d itambox"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

volumes:
  pgdata:

