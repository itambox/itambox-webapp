version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ASSETBOX_SECRET_KEY=change-me-in-production
      - ASSETBOX_DEBUG=True
      - ASSETBOX_DB_ENGINE=django.db.backends.postgresql
      - ASSETBOX_DB_NAME=assetbox
      - ASSETBOX_DB_USER=assetbox
      - ASSETBOX_DB_PASSWORD=assetbox
      - ASSETBOX_DB_HOST=db
      - ASSETBOX_DB_PORT=5432
    volumes:
      - ./assetbox:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: assetbox
      POSTGRES_PASSWORD: assetbox
      POSTGRES_DB: assetbox
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetbox -d assetbox"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

volumes:
  pgdata:

