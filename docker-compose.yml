version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://assetbox:assetbox@db:5432/assetbox
      - SECRET_KEY=change-me-in-production
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: assetbox
      POSTGRES_PASSWORD: assetbox
      POSTGRES_DB: assetbox
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
