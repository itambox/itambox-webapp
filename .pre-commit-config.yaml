repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Managed, pinned environment so missing Bugbear or diagnostic dependency
  # drift cannot silently weaken the policy relative to Linux CI.
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        alias: flake8-baseline
        name: flake8 (blocking baseline gate)
        entry: python scripts/check_flake8_baseline.py
        # The identity baseline is interpreter-specific; keep local hooks on
        # the same canonical interpreter as CI and Docker.
        language_version: python3.12
        additional_dependencies:
          - flake8-bugbear==24.12.12
          - mccabe==0.7.0
          - pycodestyle==2.11.1
          - pyflakes==3.2.0
        pass_filenames: false
        always_run: true
