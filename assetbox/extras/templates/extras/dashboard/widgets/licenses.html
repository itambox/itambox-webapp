{% load i18n %}
<div class="text-muted small mb-2">Highest Utilization Rates</div>
{% for item in license_stats %}
<div class="mb-2">
    <div class="d-flex justify-content-between small mb-1">
        <a href="{% url 'licenses:license_detail' item.license.pk %}" class="text-reset">{{ item.license.name }}</a>
        <span class="text-muted">{{ item.allocated }}/{{ item.total }} seats ({{ item.util_pct }}%)</span>
    </div>
    <div class="progress progress-xs">
        <div class="progress-bar {% if item.util_pct >= 90 %}bg-danger{% elif item.util_pct >= 70 %}bg-warning{% else %}bg-green{% endif %}" style="width: {{ item.util_pct }}%"></div>
    </div>
</div>
{% empty %}
<div class="text-muted text-center py-4">No software licenses registered.</div>
{% endfor %}
