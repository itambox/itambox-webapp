{% load i18n %}
{% if has_data %}
<div class="list-group list-group-flush" style="font-size: 0.85rem;">
    {% for item in counts %}
    <div class="list-group-item px-0 py-2 d-flex justify-content-between align-items-center">
        <span>{{ item.label }}</span>
        {% if item.url %}
        <a href="{{ item.url }}" class="badge bg-blue-lt text-blue text-decoration-none">{{ item.count }}</a>
        {% else %}
        <span class="badge bg-blue-lt text-blue">{{ item.count }}</span>
        {% endif %}
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-muted text-center py-3">
    <i class="mdi mdi-chart-bar mb-2"></i>
    <p class="small">{% trans 'Configure this widget to select which object types to count.' %}</p>
</div>
{% endif %}
