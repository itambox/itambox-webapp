{% load i18n %}
<div class="row g-3 mb-4">
    <div class="col-sm-4">
        <div class="card card-sm bg-blue-lt border-0 shadow-none">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <span class="bg-blue text-white avatar rounded shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-archive" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 4m0 2a2 2 0 0 1 2 -2h16a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-16a2 2 0 0 1 -2 -2z" /><path d="M3 8h18" /><path d="M10 12h4" /></svg>
                        </span>
                    </div>
                    <div class="col">
                        <div class="font-weight-medium text-blue small uppercase font-sans">{% translate "Total Purchased" %}</div>
                        <div class="text-blue h1 mb-0 font-weight-bold">{{ object.total_stock }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-sm-4">
        <div class="card card-sm bg-purple-lt border-0 shadow-none">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <span class="bg-purple text-white avatar rounded shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-minus" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 12l14 0" /></svg>
                        </span>
                    </div>
                    <div class="col">
                        <div class="font-weight-medium text-purple small uppercase font-sans">{% translate "Consumed" %}</div>
                        <div class="text-purple h1 mb-0 font-weight-bold">{{ object.consumed_qty }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-sm-4">
        <div class="card card-sm {% if object.available <= 0 %}bg-danger-lt{% elif object.available < object.min_qty %}bg-warning-lt{% else %}bg-success-lt{% endif %} border-0 shadow-none">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <span class="{% if object.available <= 0 %}bg-danger{% elif object.available < object.min_qty %}bg-warning{% else %}bg-success{% endif %} text-white avatar rounded shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-circle-check" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" /><path d="M9 12l2 2l4 -4" /></svg>
                        </span>
                    </div>
                    <div class="col">
                        <div class="font-weight-medium {% if object.available <= 0 %}text-danger{% elif object.available < object.min_qty %}text-warning{% else %}text-success{% endif %} small uppercase font-sans">{% translate "Remaining Stock" %}</div>
                        <div class="{% if object.available <= 0 %}text-danger{% elif object.available < object.min_qty %}text-warning{% else %}text-success{% endif %} h1 mb-0 font-weight-bold">
                            {{ object.available }}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
