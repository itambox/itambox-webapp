{% load i18n %}
{% load render_table from django_tables2 %}
{# Table rendering block for HTMX list views #}
{# Expects context: table #}
<div id="object-list-table-container">
    <div class="table-responsive w-100">
       {% if table %}
           {% render_table table "global_includes/htmx_table.html" %}
       {% else %}
           <div class="p-3">
               <p class="text-muted mb-0">{% translate "No table data available." %}</p>
           </div>
       {% endif %}
    </div>
</div>
