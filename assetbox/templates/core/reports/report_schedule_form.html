{% extends "generic/object_edit.html" %}
{% load i18n %}

{% block javascript %}
{{ block.super }}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const freqSelect = document.querySelector("select[name='frequency']");
        const cronField = document.querySelector("#div_id_cron_expression");
        const startTimeField = document.querySelector("#div_id_start_time");
        
        function toggleFields() {
            if (!freqSelect) return;
            const freq = freqSelect.value;
            
            // Show custom cron expression field only if frequency is 'cron'
            if (cronField) {
                cronField.style.display = (freq === 'cron') ? 'block' : 'none';
            }
            
            // Show start time picker for recurring frequencies (daily, weekly, monthly, etc.)
            if (startTimeField) {
                const showStartTime = ['daily', 'weekly', 'biweekly', 'monthly', 'quarterly', 'yearly'].includes(freq);
                startTimeField.style.display = showStartTime ? 'block' : 'none';
            }
        }
        
        if (freqSelect) {
            freqSelect.addEventListener("change", toggleFields);
            toggleFields();
        }
    });
</script>
{% endblock javascript %}
