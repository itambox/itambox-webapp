<div class="modal modal-blur fade" id="table-config-modal" tabindex="-1" aria-labelledby="tableConfigModalLabel" aria-hidden="true" data-table-name="{{ table_name }}">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <form class="form userconfigform" data-url="{% url 'api:users_api:user-config' %}" data-config-root="tables.{{ table_name }}">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title" id="tableConfigModalLabel">Configure {{ table_verbose_name }} Table</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body row">
                    <div class="col-md-5 text-center">
                        {{ form.available_columns.label_tag }}
                        {{ form.available_columns }}
                    </div>
                    <div class="col-md-2 d-flex flex-column align-items-center justify-content-center">
                        <button type="button" class="btn btn-success btn-sm w-100 my-1" id="btn-add-cols">
                            Add &rarr;
                        </button>
                        <button type="button" class="btn btn-danger btn-sm w-100 my-1" id="btn-remove-cols">
                            &larr; Remove
                        </button>
                    </div>
                    <div class="col-md-5 text-center">
                        {{ form.columns.label_tag }}
                        {{ form.columns }}
                        <div class="mt-2">
                            <button type="button" class="btn btn-primary btn-sm" id="btn-cols-up">&uarr; Move Up</button>
                            <button type="button" class="btn btn-primary btn-sm ms-1" id="btn-cols-down">&darr; Move Down</button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-danger me-auto" id="btn-reset-cols">Reset</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btn-apply-cols">Apply</button>
                </div>
            </form>
            {# --- Add JavaScript for Modal Interactions --- #}
            <script>
            (function() {
                const modalElement = document.getElementById('table-config-modal');
                if (!modalElement) return;

                const form = modalElement.querySelector('form.userconfigform');
                const availableSelect = modalElement.querySelector('select.available-columns');
                const selectedSelect = modalElement.querySelector('select.selected-columns');
                const btnAdd = modalElement.querySelector('#btn-add-cols');
                const btnRemove = modalElement.querySelector('#btn-remove-cols');
                const btnUp = modalElement.querySelector('#btn-cols-up');
                const btnDown = modalElement.querySelector('#btn-cols-down');
                const btnApply = modalElement.querySelector('#btn-apply-cols');
                const btnReset = modalElement.querySelector('#btn-reset-cols'); // Assuming reset might fetch defaults later

                // Function to move options between selects
                function moveOptions(sourceSelect, destSelect) {
                    Array.from(sourceSelect.selectedOptions).forEach(option => {
                        destSelect.appendChild(option);
                        option.selected = false; // Deselect after moving
                    });
                }

                // Function to move options up/down within a select
                function moveOption(select, direction) {
                    const selectedOptions = Array.from(select.selectedOptions);
                    if (selectedOptions.length !== 1) return; // Only move one at a time
                    const option = selectedOptions[0];
                    const index = option.index;

                    if (direction === 'up' && index > 0) {
                        select.insertBefore(option, select.options[index - 1]);
                    } else if (direction === 'down' && index < select.options.length - 1) {
                        select.insertBefore(option, select.options[index + 2]); // Insert before the one after next
                    }
                }

                // Event Listeners
                btnAdd.addEventListener('click', () => moveOptions(availableSelect, selectedSelect));
                btnRemove.addEventListener('click', () => moveOptions(selectedSelect, availableSelect));
                btnUp.addEventListener('click', () => moveOption(selectedSelect, 'up'));
                btnDown.addEventListener('click', () => moveOption(selectedSelect, 'down'));

                // Apply Button Logic (Simplified: PATCH with only columns)
                btnApply.addEventListener('click', () => {
                    const selectedColumns = Array.from(selectedSelect.options).map(opt => opt.value);
                    const apiUrl = form.dataset.url;
                    const configRoot = form.dataset.configRoot; // e.g., "tables.extras.tag"
                    const csrfToken = form.querySelector('[name="csrfmiddlewaretoken"]').value;

                    // Construct the nested payload for PATCH
                    // Deeply nested structure based on configRoot
                    let payload = {};
                    let currentLevel = payload;
                    const keys = configRoot.split('.');
                    keys.forEach((key, index) => {
                        if (index === keys.length - 1) {
                            currentLevel[key] = { 'columns': selectedColumns };
                        } else {
                            currentLevel[key] = currentLevel[key] || {};
                            currentLevel = currentLevel[key];
                        }
                    });

                    // --- Log the payload before sending --- 
                    console.log("PATCH Payload:", JSON.stringify(payload, null, 2)); // Log formatted JSON

                    // --- Send PATCH Request --- 
                    fetch(apiUrl, {
                        method: 'PATCH', // Use PATCH to partially update config
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': csrfToken
                        },
                        body: JSON.stringify(payload)
                    })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Failed to save configuration');
                        }
                        return response.json();
                    })
                    .then(data => {
                        // Close modal
                        const modalInstance = bootstrap.Modal.getInstance(modalElement);
                        if (modalInstance) modalInstance.hide();
                        // Reload the page to see table changes
                        window.location.reload(); 
                    })
                    .catch(error => {
                        console.error('Error saving table config:', error);
                        // TODO: Show an error message to the user
                        alert('Error saving configuration: ' + error.message);
                    });
                });
                
                // Reset button: clear saved preferences for this table
                if (btnReset) {
                    btnReset.addEventListener('click', () => {
                        const apiUrl = form.dataset.url;
                        const configRoot = form.dataset.configRoot;
                        const csrfToken = form.querySelector('[name="csrfmiddlewaretoken"]').value;

                        // Build same nested payload but with null (falsy) to clear config
                        let payload = {};
                        let currentLevel = payload;
                        const keys = configRoot.split('.');
                        keys.forEach((key, index) => {
                            if (index === keys.length - 1) {
                                currentLevel[key] = {}; // Empty config = reset to defaults
                            } else {
                                currentLevel[key] = currentLevel[key] || {};
                                currentLevel = currentLevel[key];
                            }
                        });

                        fetch(apiUrl, {
                            method: 'PATCH',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': csrfToken
                            },
                            body: JSON.stringify(payload)
                        })
                        .then(response => {
                            if (!response.ok) throw new Error('Failed to reset configuration');
                            return response.json();
                        })
                        .then(() => {
                            const modalInstance = bootstrap.Modal.getInstance(modalElement);
                            if (modalInstance) modalInstance.hide();
                            window.location.reload();
                        })
                        .catch(error => {
                            console.error('Error resetting table config:', error);
                            alert('Error resetting configuration: ' + error.message);
                        });
                    });
                }

            })();
            </script>
        </div>
    </div>
</div>
