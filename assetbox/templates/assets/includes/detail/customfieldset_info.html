<dl class="row mb-0">
    <dt class="col-sm-3">Fieldset Name:</dt>
    <dd class="col-sm-9"><strong>{{ object.name }}</strong></dd>

    <dt class="col-sm-3">Custom Fields ({{ object.fields.count }}):</dt>
    <dd class="col-sm-9">
        {% if object.fields.all %}
            <ul class="list-unstyled mb-0 mt-1">
                {% for field in object.fields.all %}
                    <li class="mb-1">
                        <a href="{{ field.get_absolute_url }}" class="font-weight-medium text-decoration-none">
                            <span class="badge bg-secondary-lt font-monospace me-1">{{ field.name }}</span>
                            {{ field.label }}
                        </a>
                        <span class="text-muted small">({{ field.get_field_type_display }})</span>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <span class="text-muted"><i>No custom fields assigned.</i></span>
        {% endif %}
    </dd>
</dl>
