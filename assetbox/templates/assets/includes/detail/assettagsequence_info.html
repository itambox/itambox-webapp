<dl class="row mb-0">
    <dt class="col-sm-4">Prefix:</dt>
    <dd class="col-sm-8"><span class="badge bg-secondary-lt font-monospace">{{ object.prefix }}</span></dd>

    <dt class="col-sm-4">Next Numeric Value:</dt>
    <dd class="col-sm-8"><span class="badge bg-primary-lt">{{ object.next_value }}</span></dd>

    <dt class="col-sm-4">Zero Padding:</dt>
    <dd class="col-sm-8">{{ object.zero_padding }} digits</dd>

    <dt class="col-sm-4">Next Tag Preview:</dt>
    <dd class="col-sm-8"><strong class="font-monospace text-primary">{{ object.next_tag_preview }}</strong></dd>
</dl>
