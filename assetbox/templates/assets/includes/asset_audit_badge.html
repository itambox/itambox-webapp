{# templates/assets/includes/asset_audit_badge.html #}
<div id="asset-audit-badge-container" class="d-inline-block animate-bounce-spring">
    {% if asset.last_audited %}
        <span class="badge bg-success-lt text-success font-weight-bold p-2" data-bs-toggle="tooltip" title="Audited by {{ asset.last_audited_by.username }}">
            <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-checkbox" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                <path d="M9 11l3 3l8 -8" />
                <path d="M20 12v6a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12a2 2 0 0 1 2 -2h9" />
            </svg>
            Audited {{ asset.last_audited|timesince }} ago by {{ asset.last_audited_by.username }}
        </span>
    {% else %}
        <span class="badge bg-warning-lt text-warning font-weight-bold p-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-alert-triangle" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                <path d="M12 9v4" />
                <path d="M12 17h.01" />
                <path d="M5 19h14a2 2 0 0 0 1.84 -2.75l-7.1 -12.25a2 2 0 0 0 -3.5 0l-7.1 12.25a2 2 0 0 0 1.75 2.75" />
            </svg>
            Never Audited
        </span>
    {% endif %}
</div>
