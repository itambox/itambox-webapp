{% load i18n %}
<div class="row g-3 mb-4">
    <div class="col-12">
        <div class="card card-sm bg-purple-lt border-0 shadow-none">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <span class="bg-purple text-white avatar rounded shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-link" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M10 14a3.5 3.5 0 0 1 -5 -4l4 -4a3.5 3.5 0 0 1 5 4m-4 4l-4 4a3.5 3.5 0 0 0 5 4l4 -4" /></svg>
                        </span>
                    </div>
                    <div class="col">
                        <div class="font-weight-medium text-purple small uppercase font-sans">{% translate "Active Assignments" %}</div>
                        <div class="text-purple h1 mb-0 font-weight-bold">{{ assignments_table.rows|length }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
