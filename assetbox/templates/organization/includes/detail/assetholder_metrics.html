<div class="row g-3 mb-4">
    <div class="col-12">
        <div class="card card-sm bg-indigo-lt border-0 shadow-none">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <span class="bg-indigo text-white avatar rounded shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-clipboard-check" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M9 5h-2a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-12a2 2 0 0 0 -2 -2h-2" /><path d="M9 3m0 2a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v0a2 2 0 0 1 -2 2h-2a2 2 0 0 1 -2 -2z" /><path d="M9 14l2 2l4 -4" /></svg>
                        </span>
                    </div>
                    <div class="col">
                        <div class="font-weight-medium text-indigo small uppercase font-sans">Checked Out Assets Assigned</div>
                        <div class="text-indigo h1 mb-0 font-weight-bold">{{ assignments_table.rows|length }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="row g-3">
    <div class="col-sm-4">
        <div class="card card-sm bg-teal-lt border-0 shadow-none">
            <div class="card-body p-2">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <span class="bg-teal text-white avatar-sm rounded shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-keyboard" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2 -2v-10a2 2 0 0 0 -2 -2h-14a2 2 0 0 0 -2 2z" /><path d="M6 10h.01" /><path d="M10 10h.01" /><path d="M14 10h.01" /><path d="M18 10h.01" /><path d="M7 14h10" /></svg>
                        </span>
                    </div>
                    <div class="col">
                        <div class="font-weight-medium text-teal small uppercase font-sans">Accessories</div>
                        <div class="text-teal h3 mb-0 font-weight-bold">{{ object.accessory_assignments.count }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-sm-4">
        <div class="card card-sm bg-cyan-lt border-0 shadow-none">
            <div class="card-body p-2">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <span class="bg-cyan text-white avatar-sm rounded shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-droplet" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 3l1.2 1.78a8 8 0 1 1 -2.4 0l1.2 -1.78z" /></svg>
                        </span>
                    </div>
                    <div class="col">
                        <div class="font-weight-medium text-cyan small uppercase font-sans">Consumable Usage</div>
                        <div class="text-cyan h3 mb-0 font-weight-bold">{{ object.consumable_consumptions.count }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-sm-4">
        <div class="card card-sm bg-blue-lt border-0 shadow-none">
            <div class="card-body p-2">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <span class="bg-blue text-white avatar-sm rounded shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-key" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M16.555 3.843a8 8 0 1 0-.342 15.228l-1.213-1.213a6 6 0 1 1 .184-11.83l1.371-2.185z" /><path d="M19 16v4" /><path d="M17 18h4" /></svg>
                        </span>
                    </div>
                    <div class="col">
                        <div class="font-weight-medium text-blue small uppercase font-sans">License Seats</div>
                        <div class="text-blue h3 mb-0 font-weight-bold">{{ object.license_assignments.count }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
